name: CI Integracao e Alertas

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
    - name: Fazer o checkout do codigo
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Rodar Testes Unitarios
      run: python -m unittest test_app.py

    - name: Enviar Alerta em caso de falha (Semana 6)
      if: failure()
      run: |
        curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
        -H "Accept: application/vnd.github.v3+json" \
        https://api.github.com/repos/${{ github.repository }}/issues \
        -d '{"title":"🚨 ALERTA: Falha no Workflow de CI","body":"Os testes unitários falharam na Pull Request. Por favor, verifique os logs."}'
